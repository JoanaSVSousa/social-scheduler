name: Send daily publication report

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: daily-publication-report
  cancel-in-progress: false

jobs:
  daily-publication-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DAILY_REPORT_ENDPOINT: ${{ secrets.DAILY_REPORT_ENDPOINT }}
      DAILY_REPORT_RUN_TOKEN: ${{ secrets.DAILY_REPORT_RUN_TOKEN }}
    steps:
      - name: Send daily publication report
        run: |
          curl --fail --show-error --silent \
            --request POST "$DAILY_REPORT_ENDPOINT" \
            --header "Authorization: Bearer $DAILY_REPORT_RUN_TOKEN"
