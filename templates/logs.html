{% extends "base.html" %}

{% block content %}
<div class="section-title">
    <div>
        <p class="eyebrow">Automation Events</p>
        <h1>Logs</h1>
    </div>
</div>

<div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th>Time</th>
                <th>Level</th>
                <th>Post</th>
                <th>Message</th>
            </tr>
        </thead>
        <tbody>
            {% for log in logs %}
            <tr>
                <td>{{ log.created_at }}</td>
                <td><span class="log-level {{ log.level|lower }}">{{ log.level }}</span></td>
                <td>{{ log.post_title or "-" }}</td>
                <td>{{ log.message }}</td>
            </tr>
            {% else %}
            <tr><td colspan="4">No logs yet.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
